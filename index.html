<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลนักเรียน</title>
    <!-- นำเข้าฟอนต์ Prompt เพื่อความทันสมัยและอ่านง่าย -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-color: #eff6ff;
            --text-color: #334155;
            --border-color: #cbd5e1;
            --bg-color: #f8fafc;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            background-color: var(--white);
            width: 100%;
            max-width: 900px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.08);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 28px;
            font-weight: 600;
        }

        header p {
            color: #64748b;
            font-size: 14px;
            margin-top: 5px;
        }

        fieldset {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            background-color: var(--white);
        }

        legend {
            font-weight: 500;
            color: var(--primary-color);
            padding: 0 15px;
            font-size: 18px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .full-width {
            grid-column: span 3;
        }

        .two-thirds {
            grid-column: span 2;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
            background-color: #fafafa;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            background-color: var(--white);
        }

        /* Styling พิเศษสำหรับ Input Type ต่างๆ */
        input[type="color"] {
            width: 100%;
            height: 42px;
            padding: 5px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
        }

        input[type="file"] {
            border: 1px dashed var(--border-color);
            padding: 10px;
            border-radius: 8px;
            background-color: var(--bg-color);
            cursor: pointer;
        }

        /* Checkbox & Radio Layout */
        .radio-group, .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding-top: 5px;
        }

        .radio-item, .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        input[type="radio"], input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .terms-section {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        /* Button Group */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button[type="submit"] {
            background-color: var(--primary-color);
            color: var(--white);
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        button[type="reset"] {
            background-color: #e2e8f0;
            color: #475569;
        }

        button[type="reset"]:hover {
            background-color: #cbd5e1;
        }

        /* Responsive Design (สำหรับหน้าจอแท็บเล็ตและมือถือ) */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .full-width, .two-thirds {
                grid-column: span 2;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width, .two-thirds {
                grid-column: span 1;
            }
            .btn-group {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>แบบฟอร์มเก็บข้อมูลนักเรียน</h1>
            <p>กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้องตามความเป็นจริง</p>
        </header>

        <form action="#" method="POST" enctype="multipart/form-data">
            
            <!-- 1. ข้อมูลส่วนตัว -->
            <fieldset>
                <legend>1. ข้อมูลส่วนตัว</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="prefix">คำนำหน้า</label>
                        <select id="prefix" name="prefix" required>
                            <option value="" disabled selected>เลือกคำนำหน้า</option>
                            <option value="เด็กชาย">เด็กชาย</option>
                            <option value="เด็กหญิง">เด็กหญิง</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                        </select>
                    </div>
                    <div class="form-group two-thirds">
                        <label for="fullname">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" name="fullname" placeholder="ตัวอย่าง: สมชาย ใจดี" required>
                    </div>
                    <div class="form-group">
                        <label for="nickname">ชื่อเล่น</label>
                        <input type="text" id="nickname" name="nickname" placeholder="เช่น: ต้น">
                    </div>
                    <div class="form-group">
                        <label for="student-id">เลขประจำตัวนักเรียน</label>
                        <input type="text" id="student-id" name="student_id" pattern="[0-9]{5,}" placeholder="เลข 5 หลักขึ้นไป" required>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">วันเดือนปีเกิด</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                    </div>
                    <div class="form-group">
                        <label for="age">อายุ (ปี)</label>
                        <input type="number" id="age" name="age" min="1" max="100" placeholder="ระบุอายุ" required>
                    </div>
                </div>
            </fieldset>

            <!-- 2. ข้อมูลการติดต่อ -->
            <fieldset>
                <legend>2. ข้อมูลการติดต่อ</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="email">อีเมล</label>
                        <input type="email" id="email" name="email" placeholder="student@example.com" required>
                    </div>
                    <div class="form-group two-thirds">
                        <label for="tel">เบอร์โทรศัพท์</label>
                        <input type="tel" id="tel" name="tel" pattern="[0-9]{9,10}" placeholder="เช่น: 0812345678" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="address">ที่อยู่ปัจจุบัน</label>
                        <textarea id="address" name="address" rows="3" placeholder="บ้านเลขที่, ถนน, ตำบล, อำเภอ..." required></textarea>
                    </div>
                </div>
            </fieldset>

            <!-- 3. ข้อมูลส่วนบุคคล -->
            <fieldset>
                <legend>3. ข้อมูลส่วนบุคคล</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label>เพศ</label>
                        <div class="radio-group">
                            <label class="radio-item"><input type="radio" name="gender" value="ชาย" required> ชาย</label>
                            <label class="radio-item"><input type="radio" name="gender" value="หญิง"> หญิง</label>
                            <label class="radio-item"><input type="radio" name="gender" value="อื่นๆ"> อื่นๆ</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="religion">ศาสนา</label>
                        <select id="religion" name="religion" required>
                            <option value="" disabled selected>เลือกศาสนา</option>
                            <option value="พุทธ">พุทธ</option>
                            <option value="คริสต์">คริสต์</option>
                            <option value="อิสลาม">อิสลาม</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="province">จังหวัด</label>
                        <input type="text" id="province" name="province" placeholder="เช่น: กรุงเทพมหานคร" required>
                    </div>
                    <div class="form-group">
                        <label for="blood-type">กรุ๊ปเลือด</label>
                        <select id="blood-type" name="blood_type" required>
                            <option value="" disabled selected>เลือกกรุ๊ปเลือด</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="O">O</option>
                            <option value="AB">AB</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- 4. ความสนใจ -->
            <fieldset>
                <legend>4. ความสนใจ</legend>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>งานอดิเรก (เลือกได้มากกว่า 1 ข้อ)</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="hobbies" value="อ่านหนังสือ"> อ่านหนังสือ</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobbies" value="เล่นกีฬา"> เล่นกีฬา</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobbies" value="ฟังเพลง/ดูหนัง"> ฟังเพลง/ดูหนัง</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobbies" value="เล่นเกม"> เล่นเกม</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobbies" value="วาดภาพ"> วาดภาพ</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="fav-color">สีที่ชอบ</label>
                        <input type="color" id="fav-color" name="fav_color" value="#2563eb">
                    </div>
                    <div class="form-group two-thirds">
                        <label for="fav-url">เว็บไซต์ที่ชอบ (URL)</label>
                        <input type="url" id="fav-url" name="fav_url" placeholder="https://www.example.com">
                    </div>
                </div>
            </fieldset>

            <!-- 5. ข้อมูลการศึกษา -->
            <fieldset>
                <legend>5. ข้อมูลการศึกษา</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="grade-level">ระดับชั้น</label>
                        <select id="grade-level" name="grade_level" required>
                            <option value="" disabled selected>เลือกระดับชั้น</option>
                            <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
                            <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
                            <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
                            <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
                            <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
                            <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="classroom">ห้องเรียน</label>
                        <input type="number" id="classroom" name="classroom" min="1" max="20" placeholder="เช่น: 1" required>
                    </div>
                    <div class="form-group">
                        <label for="program">แผนการเรียน</label>
                        <select id="program" name="program" required>
                            <option value="" disabled selected>เลือกแผนการเรียน</option>
                            <option value="วิทย์-คณิต">วิทยาศาสตร์ - คณิตศาสตร์</option>
                            <option value="ศิลป์-คำนวณ">ศิลปศาสตร์ - คำนวณ</option>
                            <option value="ศิลป์-ภาษา">ศิลปศาสตร์ - ภาษา</option>
                            <option value="ทั่วไป">ทั่วไป / อื่นๆ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="gpa">เกรดเฉลี่ย (GPA)</label>
                        <input type="number" id="gpa" name="gpa" min="0.00" max="4.00" step="0.01" placeholder="0.00 - 4.00" required>
                    </div>
                </div>
            </fieldset>

            <!-- 6. การอัปโหลดไฟล์ -->
            <fieldset>
                <legend>6. การอัปโหลดไฟล์</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="profile-pic">รูปภาพประจำตัว</label>
                        <input type="file" id="profile-pic" name="profile_pic" accept="image/*" required>
                    </div>
                    <div class="form-group two-thirds">
                        <label for="documents">เอกสารเพิ่มเติม (เช่น สำเนาบัตรฯ, ปพ.)</label>
                        <input type="file" id="documents" name="documents" accept=".pdf,.doc,.docx,.jpg,.png" multiple>
                    </div>
                </div>
            </fieldset>

            <!-- 7. ความคิดเห็นเพิ่มเติม -->
            <fieldset>
                <legend>7. ความคิดเห็นเพิ่มเติม</legend>
                <div class="form-group">
                    <label for="comments">แสดงความคิดเห็นหรือข้อเสนอแนะ</label>
                    <textarea id="comments" name="comments" rows="4" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
                </div>
            </fieldset>

            <!-- 8. ยืนยันข้อมูล -->
            <div class="terms-section">
                <label class="checkbox-item">
                    <input type="checkbox" name="accept_terms" required> 
                    ข้าพเจ้ายอมรับเงื่อนไขการใช้งานและยืนยันว่าข้อมูลข้างต้นเป็นความจริง
                </label>
            </div>

            <div class="btn-group">
                <button type="submit">ส่งข้อมูล</button>
                <button type="reset">ล้างข้อมูล</button>
            </div>

        </form>
    </div>

</body>
</html>
